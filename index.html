<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Sederhana</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
      }

      header,
      footer {
        background-color: #260eff;
        color: rgb(255, 255, 255);
        padding: 15px;
        text-align: center;
      }

      .container {
        display: flex;
        padding: 20px;
      }

      article {
        flex: 3;
        padding: 20px;
        background: #f4f4f4;
        margin-right: 20px;
      }

      aside {
        flex: 1;
        padding: 20px;
        background: #ddd;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Header Halaman</h1>
    </header>

    <div class="container">
      <article>
        <h2>Judul Artikel</h2>
        <p>
          Ini adalah bagian artikel. Kamu bisa menuliskan konten utama di sini,
          seperti materi kuliah, penjelasan konsep, atau posting blog.
        </p>
      </article>

      <aside>
        <h3>Sidebar</h3>
        <p>
          Ini adalah area sidebar, cocok untuk menu, link, atau informasi
          tambahan.
        </p>
      </aside>
    </div>

    <footer>
      <p>© 2026 Halaman Sederhana</p>
    </footer>
  </body>
</html>
